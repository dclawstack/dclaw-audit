apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dclaw-audit.fullname" . }}
  labels:
    {{- include "dclaw-audit.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "dclaw-audit.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dclaw-audit.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "dclaw-audit.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "dclaw-audit.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
