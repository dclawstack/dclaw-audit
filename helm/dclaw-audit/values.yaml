replicaCount: 1

image:
  repository: ghcr.io/dclawstack/dclaw-audit
  pullPolicy: IfNotPresent
  tag: ""

service:
  type: ClusterIP
  port: 8125

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: audit.dclawstack.io
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

postgresql:
  enabled: true
  auth:
    database: dclaw_audit
    username: postgres
    password: postgres
  primary:
    persistence:
      enabled: true
      size: 10Gi

serviceAccount:
  create: true
  annotations: {}
  name: ""
